name: CI

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: skilling-mmo

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: skilling
          POSTGRES_PASSWORD: skilling
          POSTGRES_DB: skilling_mmo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skilling -d skilling_mmo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://skilling:skilling@127.0.0.1:5432/skilling_mmo_test?schema=public
      JWT_SECRET: ci-test-secret
      REDIS_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: skilling-mmo/package-lock.json

      - name: Install
        run: npm ci

      - name: Prisma generate + migrate
        run: |
          npm run generate -w @skilling-mmo/db
          npm run deploy -w @skilling-mmo/db

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (incl. marketplace atomicity)
        run: npm run test

      - name: Build packages + client
        run: |
          npm run build -w @skilling-mmo/shared
          npm run build -w @skilling-mmo/db
          npm run build -w @skilling-mmo/api
          npm run build -w @skilling-mmo/game-server
          npm run build -w @skilling-mmo/worker
          npm run build -w @skilling-mmo/client
