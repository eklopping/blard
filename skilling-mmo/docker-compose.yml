services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skilling}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skilling}
      POSTGRES_DB: ${POSTGRES_DB:-skilling_mmo}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skilling} -d ${POSTGRES_DB:-skilling_mmo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    profiles: ["full"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-skilling}:${POSTGRES_PASSWORD:-skilling}@postgres:5432/${POSTGRES_DB:-skilling_mmo}?schema=public
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      API_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  game-server:
    build:
      context: .
      dockerfile: apps/game-server/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-skilling}:${POSTGRES_PASSWORD:-skilling}@postgres:5432/${POSTGRES_DB:-skilling_mmo}?schema=public
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      GAME_PORT: 2567
    ports:
      - "2567:2567"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-skilling}:${POSTGRES_PASSWORD:-skilling}@postgres:5432/${POSTGRES_DB:-skilling_mmo}?schema=public
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["full"]
    restart: unless-stopped

  caddy:
    # Built client image (Caddy + static assets) — no host dist/ required
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      # Persist Let's Encrypt certs across rebuilds
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - game-server
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
